<div class="auth-container">
  <div class="auth-card">
    <div class="auth-logo">🔐</div>
    <h2>{{ 'AUTH.RESET_TITLE' | translate }}</h2>
    <p class="auth-subtitle">Insere o teu email para recuperar a senha</p>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>
    <div class="alert alert-success" *ngIf="success">{{ success }}</div>

    <form (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>{{ 'AUTH.EMAIL' | translate }}</label>
        <input type="email" [(ngModel)]="email" name="email" required placeholder="exemplo@email.com"/>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        {{ loading ? '...' : ('AUTH.BTN_RESET' | translate) }}
      </button>
    </form>

    <p class="auth-switch">
      <a routerLink="/auth/login">← Voltar ao login</a>
    </p>
  </div>
</div>
